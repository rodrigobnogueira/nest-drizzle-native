name: Bug report
description: Report a reproducible problem in nest-drizzle-native.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please include enough detail for maintainers to reproduce it without guessing about your Nest, Drizzle, driver, or transaction setup.
        Do not paste secrets, production connection strings, tokens, private certificates, customer data, or unredacted hostnames.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the behavior you saw and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Link to a minimal repo or paste the smallest code snippet that demonstrates the issue.
      placeholder: |
        DrizzleModule.forRoot({
          schema,
          connection: db,
        });
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: nest-drizzle-native version
      placeholder: "0.2.0"
    validations:
      required: true
  - type: input
    id: nest-version
    attributes:
      label: NestJS version
      placeholder: "11.x"
    validations:
      required: true
  - type: input
    id: drizzle-version
    attributes:
      label: Drizzle ORM version
      placeholder: "0.45.x"
    validations:
      required: true
  - type: dropdown
    id: driver
    attributes:
      label: Database driver
      options:
        - pg
        - mysql2
        - better-sqlite3
        - "@libsql/client"
        - other
    validations:
      required: true
  - type: input
    id: driver-version
    attributes:
      label: Driver version
      description: For example, pg 8.x, mysql2 3.x, better-sqlite3 12.x, or @libsql/client 0.x.
      placeholder: "pg 8.x"
    validations:
      required: true
  - type: input
    id: database-engine
    attributes:
      label: Database engine/version
      description: Include the database server or local engine version when relevant.
      placeholder: "PostgreSQL 17, MySQL 8.4, SQLite 3.x"
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - DrizzleModule registration
        - InjectDrizzle
        - repositories
        - named connections
        - transactions
        - testing utilities
        - error mapping
        - samples or docs
        - release or CI
        - other
    validations:
      required: true
  - type: textarea
    id: transaction-setup
    attributes:
      label: Transaction setup, if relevant
      description: Mention @Transactional, @InjectTransaction, @nestjs-cls/transactional setup, or whether this bug happens outside transactions.
  - type: textarea
    id: migration-setup
    attributes:
      label: Migration/table setup, if relevant
      description: Mention drizzle-kit, migration command, schema/table setup, or whether the issue happens before migrations run.
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste stack traces or command output. Redact secrets, tokens, hostnames, and connection strings.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I removed or redacted secrets and connection strings.
          required: true
        - label: I checked the docs and samples for the same pattern.
          required: true
