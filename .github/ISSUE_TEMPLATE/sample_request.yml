name: Sample request
description: Request a focused runnable sample.
title: "sample: "
labels:
  - sample
body:
  - type: textarea
    id: scenario
    attributes:
      label: Scenario
      description: What real application scenario should the sample demonstrate?
    validations:
      required: true
  - type: dropdown
    id: sample-area
    attributes:
      label: Area
      options:
        - driver setup
        - repositories
        - transactions
        - validation
        - Swagger or OpenAPI
        - testing
        - multi-database
        - tenant routing
        - raw SQL
        - error mapping
        - other
    validations:
      required: true
  - type: textarea
    id: expected-files
    attributes:
      label: Expected shape
      description: Mention the important modules, services, repositories, or smoke tests the sample should include.
  - type: checkboxes
    id: rules
    attributes:
      label: Sample rules
      options:
        - label: The sample should be runnable from a clean checkout.
          required: true
        - label: Package changes should be split into a separate PR if the sample exposes a library bug.
          required: true
